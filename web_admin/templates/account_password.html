{% extends "base.html" %}
{% block title %}修改密码 - FileForge 管理后台{% endblock %}
{% block content %}
<h1>修改密码</h1>
{% if notice %}
<p class="notice">{{ notice }}</p>
{% endif %}
{% if error %}
<p role="alert">{{ error }}</p>
{% endif %}
<section class="panel form-panel">
  <form class="stacked-form" method="post" action="/account/password">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>
      当前密码
      <input type="password" name="current_password" required>
    </label>
    <label>
      新密码（至少 12 字符）
      <input type="password" name="new_password" minlength="12" required>
    </label>
    <label>
      确认新密码
      <input type="password" name="confirm_password" minlength="12" required>
    </label>
    <div class="form-actions">
      <button type="submit">保存</button>
      <a class="button-link" href="/">返回主页</a>
    </div>
  </form>
</section>
{% endblock %}

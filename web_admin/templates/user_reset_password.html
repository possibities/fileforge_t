{% extends "base.html" %}
{% block title %}重置密码 - FileForge 管理后台{% endblock %}
{% block content %}
<h1>重置密码:{{ target.username }}</h1>
{% if error %}
<p role="alert">{{ error }}</p>
{% endif %}
<form method="post" action="/admin/users/{{ target.id }}/reset-password">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <label>
    新密码（至少 12 字符）
    <input type="password" name="new_password" minlength="12" required>
  </label>
  <button type="submit">重置</button>
</form>
<p><a href="/admin/users">返回列表</a></p>
{% endblock %}

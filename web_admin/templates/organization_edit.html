{% extends "base.html" %}
{% block title %}编辑单位 - FileForge 管理后台{% endblock %}
{% block content %}
<h1>编辑单位</h1>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="post" action="/admin/organizations/{{ org.id }}/edit">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <p>
    <label for="name">名称(必填,1–255 字符,唯一)</label><br>
    <input type="text" id="name" name="name" value="{{ values.name or '' }}" maxlength="255" required>
  </p>
  <p>
    <button type="submit">保存</button>
    <a href="/admin/organizations">取消</a>
  </p>
</form>
{% endblock %}

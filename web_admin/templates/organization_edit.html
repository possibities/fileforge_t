{% extends "base.html" %}
{% block title %}编辑单位 - FileForge 管理后台{% endblock %}
{% block content %}
<h1>编辑单位</h1>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<section class="panel form-panel">
  <form class="stacked-form" method="post" action="/admin/organizations/{{ org.id }}/edit">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label for="name">
      名称(必填,1–255 字符,唯一)
      <input type="text" id="name" name="name" value="{{ values.name or '' }}" maxlength="255" required>
    </label>
    <div class="form-actions">
      <button type="submit">保存</button>
      <a class="button-link" href="/admin/organizations">取消</a>
    </div>
  </form>
</section>
{% endblock %}

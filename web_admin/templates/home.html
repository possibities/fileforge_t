{% extends "base.html" %}
{% block title %}FileForge 管理后台{% endblock %}
{% block content %}
<h1>FileForge 管理后台</h1>
<p>当前用户:{{ user.username }}{% if user.display_name %}（{{ user.display_name }}）{% endif %}</p>
<p>角色:{{ user.roles | join(", ") }}</p>
<form method="post" action="/logout">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <button type="submit">退出登录</button>
</form>
{% endblock %}

{% extends "base.html" %}
{% block title %}登录 - FileForge 管理后台{% endblock %}
{% block content %}
<h1>登录</h1>
{% if error %}
<p role="alert">{{ error }}</p>
{% endif %}
<form method="post" action="/login">
  <label>
    用户名
    <input type="text" name="username" value="{{ username or '' }}" autocomplete="username" required>
  </label>
  <label>
    密码
    <input type="password" name="password" autocomplete="current-password" required>
  </label>
  <button type="submit">登录</button>
</form>
{% endblock %}

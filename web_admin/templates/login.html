{% extends "base.html" %}
{% block title %}登录 - FileForge 管理后台{% endblock %}
{% block body_class %}login-body{% endblock %}
{% block content %}
<section class="login-shell">
  <div class="login-copy">
    <p class="eyebrow">FileForge Admin</p>
    <h1>档案分类管理后台</h1>
    <p class="login-subtitle">上传、处理、检索和修正档案元数据的管理入口。</p>
  </div>

  <div class="login-card">
    <h2>登录</h2>
    {% if error %}
    <p role="alert">{{ error }}</p>
    {% endif %}
    <form class="stacked-form" method="post" action="/login">
      <label>
        用户名
        <input type="text" name="username" value="{{ username or '' }}" autocomplete="username" required>
      </label>
      <label>
        密码
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit">登录</button>
    </form>
  </div>
</section>
{% endblock %}
